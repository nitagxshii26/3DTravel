<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3DTravel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #country-label {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1.5px;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }
    #country-label.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="country-label"></div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Scene ──────────────────────────────────────────────
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
    camera.position.z = 3.2;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const loader = new THREE.TextureLoader();

    // ── Earth ──────────────────────────────────────────────
    const earthMat = new THREE.MeshPhongMaterial({
      map: loader.load('textures/earth_daymap.jpg'),
      bumpMap: loader.load('textures/earth_bumpmap.jpg'),
      bumpScale: 0.05,
      specularMap: loader.load('textures/earth_specularmap.jpg'),
      specular: new THREE.Color(0x2266cc),
    });
    earthMat.onBeforeCompile = shader => {
      shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
        #include <map_fragment>
        float ocean = clamp((diffuseColor.b - max(diffuseColor.r, diffuseColor.g)) * 3.0, 0.0, 1.0);
        float land  = clamp((diffuseColor.g - diffuseColor.b) * 2.5, 0.0, 1.0);
        diffuseColor.b = clamp(diffuseColor.b + ocean * 0.45, 0.0, 1.0);
        diffuseColor.r = clamp(diffuseColor.r - ocean * 0.15, 0.0, 1.0);
        diffuseColor.g = clamp(diffuseColor.g + land  * 0.35, 0.0, 1.0);
        diffuseColor.r = clamp(diffuseColor.r - land  * 0.08, 0.0, 1.0);
      `);
    };
    const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), earthMat);
    scene.add(earth);

    // ── Atmosphere ─────────────────────────────────────────
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.15, 64, 64),
      new THREE.ShaderMaterial({
        vertexShader: `varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `varying vec3 vN; void main(){ float i=pow(0.7-dot(vN,vec3(0,0,1)),2.0); gl_FragColor=vec4(0.3,0.6,1.0,1.0)*i; }`,
        blending: THREE.AdditiveBlending, side: THREE.BackSide, transparent: true,
      })
    ));

    // ── Stars ──────────────────────────────────────────────
    const sp = new Float32Array(9000).map(() => (Math.random() - 0.5) * 400);
    const sg = new THREE.BufferGeometry();
    sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
    scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true })));

    // ── Lights ─────────────────────────────────────────────
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(5, 3, 5);
    scene.add(sun, new THREE.AmbientLight(0xffffff, 1.0));

    // ── Controls ───────────────────────────────────────────
    const INITIAL_DIST = 3.2;
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;
    controls.enableZoom = true;
    controls.minDistance = 1.5;
    controls.maxDistance = 6.0;
    controls.enablePan = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Geo helpers ────────────────────────────────────────
    function ll2xyz(lat, lng, r = 1.002) {
      const phi   = (90 - lat) * Math.PI / 180;
      const theta = (lng + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
         r * Math.cos(phi),
         r * Math.sin(phi) * Math.sin(theta)
      );
    }

    function xyz2ll(v) {
      const r   = v.length();
      const lat = 90 - Math.acos(Math.max(-1, Math.min(1, v.y / r))) * 180 / Math.PI;
      let   lng = Math.atan2(v.z, -v.x) * 180 / Math.PI - 180;
      if (lng < -180) lng += 360;
      return [lat, lng];
    }

    // Normalize ring so consecutive lngs never jump > 180° (antimeridian fix)
    function normalizeRing(ring) {
      if (!ring.length) return ring;
      const out = [[ring[0][0], ring[0][1]]];
      for (let i = 1; i < ring.length; i++) {
        let lng = ring[i][0];
        const prev = out[i - 1][0];
        while (lng - prev >  180) lng -= 360;
        while (prev - lng >  180) lng += 360;
        out.push([lng, ring[i][1]]);
      }
      return out;
    }

    function pointInRing(pt, ring) {
      let inside = false;
      const px = pt[0], py = pt[1];
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        if (((yi > py) !== (yj > py)) && px < (xj - xi) * (py - yi) / (yj - yi) + xi)
          inside = !inside;
      }
      return inside;
    }

    function pointInPolygon(pt, polygon) {
      return pointInRing(pt, polygon[0]) &&
             !polygon.slice(1).some(hole => pointInRing(pt, hole));
    }

    // ── Border line builder ────────────────────────────────
    function buildBorderLines(geojson, radius = 1.002) {
      const pos = [];
      function ringToLines(ring) {
        const norm = normalizeRing(ring);
        for (let i = 0; i < norm.length - 1; i++) {
          const [lng1, lat1] = norm[i];
          const [lng2, lat2] = norm[i + 1];
          if (Math.abs(lng2 - lng1) > 180) continue;
          const a = ll2xyz(lat1, lng1, radius);
          const b = ll2xyz(lat2, lng2, radius);
          pos.push(a.x, a.y, a.z, b.x, b.y, b.z);
        }
      }
      geojson.features.forEach(f => {
        const g = f.geometry;
        if (!g) return;
        if (g.type === 'Polygon')      g.coordinates.forEach(ringToLines);
        if (g.type === 'MultiPolygon') g.coordinates.forEach(p => p.forEach(ringToLines));
      });
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      return geo;
    }

    // ── Canvas-texture country/state highlight ─────────────
    const hlCanvas  = document.createElement('canvas');
    hlCanvas.width  = 2048;
    hlCanvas.height = 1024;
    const hlCtx     = hlCanvas.getContext('2d');
    const hlTexture = new THREE.CanvasTexture(hlCanvas);
    const hlMesh    = new THREE.Mesh(
      new THREE.SphereGeometry(1.003, 128, 64),
      new THREE.MeshBasicMaterial({ map: hlTexture, transparent: true, depthWrite: false })
    );
    scene.add(hlMesh);

    function paintCountry(polygons) {
      const W = hlCanvas.width, H = hlCanvas.height;
      hlCtx.clearRect(0, 0, W, H);

      if (polygons) {
        hlCtx.fillStyle = 'rgba(136, 255, 187, 0.5)';

        [-W, 0, W].forEach(offX => {
          for (const rings of polygons) {
            const outer = normalizeRing(rings[0]);
            const holes = rings.slice(1).map(h => normalizeRing(h));

            hlCtx.beginPath();
            outer.forEach(([lng, lat], i) => {
              const x = (lng + 180) / 360 * W + offX;
              const y = (90 - lat) / 180 * H;
              i === 0 ? hlCtx.moveTo(x, y) : hlCtx.lineTo(x, y);
            });
            hlCtx.closePath();

            holes.forEach(hole => {
              hole.forEach(([lng, lat], i) => {
                const x = (lng + 180) / 360 * W + offX;
                const y = (90 - lat) / 180 * H;
                i === 0 ? hlCtx.moveTo(x, y) : hlCtx.lineTo(x, y);
              });
              hlCtx.closePath();
            });

            hlCtx.fill('evenodd');
          }
        });
      }

      hlTexture.needsUpdate = true;
    }

    // ── Capital city flag pins (billboard sprites) ─────────
    const pinSprites = [];  // [{sprite, capital, country, code}] for raycasting

    // Shared canvas to draw flag + white border + drop shadow
    function makeFlagTexture(code) {
      const tex = new THREE.Texture();
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const c = document.createElement('canvas');
        const W = 72, H = 48;
        c.width  = W + 8;
        c.height = H + 8 + 10; // extra below for pin tail
        const ctx = c.getContext('2d');

        // Drop shadow
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 4;
        ctx.shadowOffsetY = 2;

        // White rounded border
        ctx.fillStyle = '#fff';
        roundRect(ctx, 2, 2, W + 4, H + 4, 4);
        ctx.fill();

        ctx.shadowColor = 'transparent';

        // Flag image clipped to rounded rect
        ctx.save();
        roundRect(ctx, 4, 4, W, H, 3);
        ctx.clip();
        ctx.drawImage(img, 4, 4, W, H);
        ctx.restore();

        // Small triangle tail pointing down from center bottom of flag box
        const cx = (W + 8) / 2;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(cx - 5, H + 6);
        ctx.lineTo(cx + 5, H + 6);
        ctx.lineTo(cx,     H + 14);
        ctx.closePath();
        ctx.fill();

        tex.image = c;
        tex.needsUpdate = true;
      };
      img.src = `https://flagcdn.com/w80/${code}.png`;
      return tex;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function buildPins(capitals) {
      capitals.forEach(({ capital, country, lat, lng, code }) => {
        if (!code) return;

        const tex = makeFlagTexture(code);
        const mat = new THREE.SpriteMaterial({
          map: tex,
          transparent: true,
          depthWrite: false,
          sizeAttenuation: true,
        });
        const sprite = new THREE.Sprite(mat);

        // Position just above surface, normal direction
        const pos = ll2xyz(lat, lng, 1.0);
        const normal = pos.clone().normalize();
        // Float the sprite outward so the tail tip touches the surface
        sprite.position.copy(pos).addScaledVector(normal, 0.12);
        sprite.scale.set(0.12, 0.09, 1);

        scene.add(sprite);
        pinSprites.push({ sprite, capital, country, code, lat, lng });
      });
    }

    // ── Data stores ────────────────────────────────────────
    const countryData = [];
    const stateData   = [];
    const label = document.getElementById('country-label');
    let currentLabel = null;

    // ── Load GeoJSON data ──────────────────────────────────
    const GEO_COUNTRIES = 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';
    const GEO_US_STATES = 'https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json';

    Promise.all([
      fetch(GEO_COUNTRIES).then(r => r.json()),
      fetch(GEO_US_STATES).then(r => r.json()),
      fetch('capitals.json').then(r => r.json()),
    ]).then(([countries, usStates, capitals]) => {
      // Country borders (dim white)
      const countryBorderGeo = buildBorderLines(countries, 1.002);
      scene.add(new THREE.LineSegments(countryBorderGeo,
        new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.25, transparent: true })
      ));

      // State borders (slightly brighter, raised just above country borders)
      const stateBorderGeo = buildBorderLines(usStates, 1.0025);
      scene.add(new THREE.LineSegments(stateBorderGeo,
        new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.45, transparent: true })
      ));

      // Build country lookup
      countries.features.forEach(f => {
        if (!f.geometry) return;
        const name = f.properties.ADMIN || f.properties.name || 'Unknown';
        const g    = f.geometry;
        const polygons = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
        countryData.push({ name, polygons });
      });

      // Build state lookup
      usStates.features.forEach(f => {
        if (!f.geometry) return;
        const name = f.properties.name || 'Unknown State';
        const g    = f.geometry;
        const polygons = g.type === 'Polygon' ? [g.coordinates] : g.coordinates;
        stateData.push({ name, polygons });
      });

      // Place capital pins
      buildPins(capitals);
    });

    // ── Hover / tap detection ──────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse     = new THREE.Vector2();

    function detectCountry(clientX, clientY) {
      mouse.x =  (clientX / innerWidth)  * 2 - 1;
      mouse.y = -(clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      // Check capital flag sprites — use intersectObjects (Sprite supports raycasting)
      if (pinSprites.length) {
        const sprites = pinSprites.map(p => p.sprite);
        const pinHits = raycaster.intersectObjects(sprites);
        if (pinHits.length) {
          const hit = pinSprites.find(p => p.sprite === pinHits[0].object);
          if (hit) {
            const lbl = `${hit.capital} · ${hit.country}`;
            if (lbl !== currentLabel) {
              currentLabel = lbl;
              label.textContent = lbl;
              label.classList.add('visible');
              paintCountry(null);
              pinSprites.forEach(p => { p.sprite.material.color.set(0xffffff); p.sprite.scale.set(0.12, 0.09, 1); });
              hit.sprite.material.color.set(0xffdd00);
              hit.sprite.scale.set(0.15, 0.112, 1);
            }
            return;
          }
        }
      }
      // Reset sprites when not hovering a pin
      pinSprites.forEach(p => { p.sprite.material.color.set(0xffffff); p.sprite.scale.set(0.12, 0.09, 1); });

      const hits = raycaster.intersectObject(earth);

      if (!hits.length) {
        currentLabel = null;
        label.classList.remove('visible');
        paintCountry(null);
        return;
      }

      const [lat, lng] = xyz2ll(hits[0].point);
      const pt = [lng, lat];

      // Check US states first
      const state = stateData.find(({ polygons }) =>
        polygons.some(rings => pointInPolygon(pt, rings))
      );

      if (state) {
        if (state.name === currentLabel) return;
        currentLabel = state.name;
        label.textContent = state.name;
        label.classList.add('visible');
        paintCountry(state.polygons);
        return;
      }

      // Fall back to country
      const country = countryData.find(({ polygons }) =>
        polygons.some(rings => pointInPolygon(pt, rings))
      );

      if (!country) {
        currentLabel = null;
        label.classList.remove('visible');
        paintCountry(null);
        return;
      }

      if (country.name === currentLabel) return;
      currentLabel = country.name;
      label.textContent = country.name;
      label.classList.add('visible');
      paintCountry(country.polygons);
    }

    window.addEventListener('mousemove', e => detectCountry(e.clientX, e.clientY));
    window.addEventListener('touchstart', e => {
      const t = e.touches[0];
      detectCountry(t.clientX, t.clientY);
    }, { passive: true });

    // ── Render loop ────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.autoRotate = camera.position.length() >= INITIAL_DIST - 0.05;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
