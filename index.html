<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3DTravel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; touch-action: none; }

    #country-label {
      position: fixed;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 20px; font-weight: 600; letter-spacing: 1.5px;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(0,0,0,0.9), 0 2px 4px rgba(0,0,0,0.8);
      opacity: 0; transition: opacity 0.2s ease;
      white-space: nowrap;
    }
    #country-label.visible { opacity: 1; }

    #info-panel {
      position: fixed;
      top: 0; right: -105%;
      width: min(360px, 100%);
      height: 100%;
      background: rgba(10,14,26,0.95);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255,255,255,0.1);
      transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 100;
      color: #fff;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #info-panel.open { right: 0; }

    #panel-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,0.1);
      border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 50%;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #panel-close:hover, #panel-close:active { background: rgba(255,255,255,0.2); }

    #panel-header {
      padding: 28px 24px 20px;
      background: linear-gradient(180deg,rgba(30,60,120,0.5) 0%,transparent 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #panel-flag {
      width: 64px; height: 43px; border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.25);
      object-fit: cover; margin-bottom: 12px; display: none;
    }
    #panel-country-name { font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
    #panel-region { font-size: 13px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }

    #panel-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .stat-cell { background: rgba(10,14,26,0.92); padding: 14px 16px; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .stat-value { font-size: 15px; font-weight: 600; }

    #see-more-btn {
      display: block; width: calc(100% - 48px);
      margin: 20px 24px 4px; padding: 13px;
      background: linear-gradient(135deg,#1a6bff,#0d4bcc);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
    }
    #see-more-btn:hover, #see-more-btn:active { opacity: 0.88; transform: translateY(-1px); }
    #see-more-btn { -webkit-tap-highlight-color: transparent; }

    #travel-info { display: none; padding: 0 24px 28px; }
    #travel-info.visible { display: block; }

    .info-section { margin-top: 20px; }
    .info-section-title {
      font-size: 11px; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .info-row {
      display: flex; align-items: flex-start;
      gap: 12px; padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon { font-size: 20px; width: 26px; flex-shrink: 0; text-align: center; margin-top: 1px; }
    .info-key { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
    .info-val { font-size: 14px; font-weight: 500; line-height: 1.4; }
    #travel-loading { text-align: center; padding: 28px 0; color: rgba(255,255,255,0.4); font-size: 14px; }
  </style>
</head>
<body>
  <div id="country-label"></div>

  <div id="info-panel">
    <button id="panel-close">&#x2715;</button>
    <div id="panel-header">
      <img id="panel-flag" alt="flag">
      <div id="panel-country-name"></div>
      <div id="panel-region"></div>
    </div>
    <div id="panel-stats">
      <div class="stat-cell"><div class="stat-label">Capital</div><div class="stat-value" id="stat-capital">&#8212;</div></div>
      <div class="stat-cell"><div class="stat-label">Population</div><div class="stat-value" id="stat-pop">&#8212;</div></div>
      <div class="stat-cell"><div class="stat-label">Currency</div><div class="stat-value" id="stat-currency">&#8212;</div></div>
      <div class="stat-cell"><div class="stat-label">Language</div><div class="stat-value" id="stat-lang">&#8212;</div></div>
    </div>
    <button id="see-more-btn">&#x2708;&#xFE0F; Travel Info</button>
    <div id="travel-info">
      <div id="travel-loading">Loading&#8230;</div>
    </div>
  </div>

  <script type="importmap">
    {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
    camera.position.z = 3.2;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const loader = new THREE.TextureLoader();

    const earthMat = new THREE.MeshPhongMaterial({
      map: loader.load('textures/earth_daymap.jpg'),
      bumpMap: loader.load('textures/earth_bumpmap.jpg'),
      bumpScale: 0.05,
      specularMap: loader.load('textures/earth_specularmap.jpg'),
      specular: new THREE.Color(0x2266cc),
    });
    earthMat.onBeforeCompile = shader => {
      shader.fragmentShader = shader.fragmentShader.replace('#include <map_fragment>', `
        #include <map_fragment>
        float ocean = clamp((diffuseColor.b - max(diffuseColor.r, diffuseColor.g)) * 3.0, 0.0, 1.0);
        float land  = clamp((diffuseColor.g - diffuseColor.b) * 2.5, 0.0, 1.0);
        diffuseColor.b = clamp(diffuseColor.b + ocean * 0.45, 0.0, 1.0);
        diffuseColor.r = clamp(diffuseColor.r - ocean * 0.15, 0.0, 1.0);
        diffuseColor.g = clamp(diffuseColor.g + land  * 0.35, 0.0, 1.0);
        diffuseColor.r = clamp(diffuseColor.r - land  * 0.08, 0.0, 1.0);
      `);
    };
    const earth = new THREE.Mesh(new THREE.SphereGeometry(1,64,64), earthMat);
    scene.add(earth);

    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.15,64,64), new THREE.ShaderMaterial({
      vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
      fragmentShader:`varying vec3 vN;void main(){float i=pow(0.7-dot(vN,vec3(0,0,1)),2.0);gl_FragColor=vec4(0.3,0.6,1.0,1.0)*i;}`,
      blending:THREE.AdditiveBlending,side:THREE.BackSide,transparent:true,
    })));

    const sp = new Float32Array(9000).map(()=>(Math.random()-0.5)*400);
    const sg = new THREE.BufferGeometry();
    sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
    scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.15,sizeAttenuation:true})));

    const sun = new THREE.DirectionalLight(0xffffff,1.2);
    sun.position.set(5,3,5);
    scene.add(sun, new THREE.AmbientLight(0xffffff,1.0));

    const INITIAL_DIST = 3.2;
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.autoRotate = true; controls.autoRotateSpeed = 0.4;
    controls.enableZoom = true; controls.minDistance = 1.5; controls.maxDistance = 6.0;
    controls.enablePan = false; controls.enableDamping = true; controls.dampingFactor = 0.05;

    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });

    function ll2xyz(lat,lng,r=1.002){
      const phi=(90-lat)*Math.PI/180, theta=(lng+180)*Math.PI/180;
      return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
    }
    function xyz2ll(v){
      const r=v.length(), lat=90-Math.acos(Math.max(-1,Math.min(1,v.y/r)))*180/Math.PI;
      let lng=Math.atan2(v.z,-v.x)*180/Math.PI-180;
      if(lng<-180)lng+=360; return[lat,lng];
    }
    function normalizeRing(ring){
      if(!ring.length)return ring;
      const out=[[ring[0][0],ring[0][1]]];
      for(let i=1;i<ring.length;i++){
        let lng=ring[i][0]; const prev=out[i-1][0];
        while(lng-prev>180)lng-=360; while(prev-lng>180)lng+=360;
        out.push([lng,ring[i][1]]);
      }
      return out;
    }
    function pointInRing(pt,ring){
      let inside=false; const px=pt[0],py=pt[1];
      for(let i=0,j=ring.length-1;i<ring.length;j=i++){
        const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
        if(((yi>py)!==(yj>py))&&px<(xj-xi)*(py-yi)/(yj-yi)+xi)inside=!inside;
      }
      return inside;
    }
    function pointInPolygon(pt,polygon){
      return pointInRing(pt,polygon[0])&&!polygon.slice(1).some(h=>pointInRing(pt,h));
    }

    function buildBorderLines(geojson,radius=1.002){
      const pos=[];
      function ringToLines(ring){
        const norm=normalizeRing(ring);
        for(let i=0;i<norm.length-1;i++){
          const[lng1,lat1]=norm[i],[lng2,lat2]=norm[i+1];
          if(Math.abs(lng2-lng1)>180)continue;
          const a=ll2xyz(lat1,lng1,radius),b=ll2xyz(lat2,lng2,radius);
          pos.push(a.x,a.y,a.z,b.x,b.y,b.z);
        }
      }
      geojson.features.forEach(f=>{
        const g=f.geometry; if(!g)return;
        if(g.type==='Polygon')g.coordinates.forEach(ringToLines);
        if(g.type==='MultiPolygon')g.coordinates.forEach(p=>p.forEach(ringToLines));
      });
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
      return geo;
    }

    const hlCanvas=document.createElement('canvas');
    hlCanvas.width=2048; hlCanvas.height=1024;
    const hlCtx=hlCanvas.getContext('2d');
    const hlTexture=new THREE.CanvasTexture(hlCanvas);
    const hlMesh=new THREE.Mesh(new THREE.SphereGeometry(1.003,128,64),
      new THREE.MeshBasicMaterial({map:hlTexture,transparent:true,depthWrite:false}));
    scene.add(hlMesh);

    function paintCountry(polygons){
      const W=hlCanvas.width,H=hlCanvas.height;
      hlCtx.clearRect(0,0,W,H);
      if(polygons){
        hlCtx.fillStyle='rgba(136,255,187,0.5)';
        [-W,0,W].forEach(offX=>{
          for(const rings of polygons){
            const outer=normalizeRing(rings[0]),holes=rings.slice(1).map(h=>normalizeRing(h));
            hlCtx.beginPath();
            outer.forEach(([lng,lat],i)=>{
              const x=(lng+180)/360*W+offX,y=(90-lat)/180*H;
              i===0?hlCtx.moveTo(x,y):hlCtx.lineTo(x,y);
            });
            hlCtx.closePath();
            holes.forEach(hole=>{
              hole.forEach(([lng,lat],i)=>{
                const x=(lng+180)/360*W+offX,y=(90-lat)/180*H;
                i===0?hlCtx.moveTo(x,y):hlCtx.lineTo(x,y);
              });
              hlCtx.closePath();
            });
            hlCtx.fill('evenodd');
          }
        });
      }
      hlTexture.needsUpdate=true;
    }

    const pinSprites=[];

    function roundRect(ctx,x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
      ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r);
      ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r);
      ctx.lineTo(x,y+r);
      ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath();
    }

    function makeFlagTexture(code){
      const tex=new THREE.Texture();
      const img=new Image(); img.crossOrigin='anonymous';
      img.onload=()=>{
        const c=document.createElement('canvas');
        const W=72,H=48; c.width=W+8; c.height=H+18;
        const ctx=c.getContext('2d');
        ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
        ctx.fillStyle='#fff'; roundRect(ctx,2,2,W+4,H+4,4); ctx.fill();
        ctx.shadowColor='transparent';
        ctx.save(); roundRect(ctx,4,4,W,H,3); ctx.clip();
        ctx.drawImage(img,4,4,W,H); ctx.restore();
        const cx=(W+8)/2;
        ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.moveTo(cx-5,H+6); ctx.lineTo(cx+5,H+6); ctx.lineTo(cx,H+14); ctx.closePath(); ctx.fill();
        tex.image=c; tex.needsUpdate=true;
      };
      img.src=`https://flagcdn.com/w80/${code}.png`;
      return tex;
    }

    function buildPins(capitals){
      capitals.forEach(({capital,country,lat,lng,code})=>{
        if(!code)return;
        const tex=makeFlagTexture(code);
        const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,sizeAttenuation:true});
        const sprite=new THREE.Sprite(mat);
        const pos=ll2xyz(lat,lng,1.0);
        sprite.position.copy(pos).addScaledVector(pos.clone().normalize(),0.022);
        sprite.scale.set(0.022,0.016,1);
        scene.add(sprite);
        pinSprites.push({sprite,capital,country,code,lat,lng});
      });
    }

    // ── Travel info panel ──────────────────────────────────
    const panel      = document.getElementById('info-panel');
    const panelClose = document.getElementById('panel-close');
    const seeMoreBtn = document.getElementById('see-more-btn');
    const travelInfo = document.getElementById('travel-info');

    let panelCountry   = null;
    let travelExpanded = false;

    panelClose.addEventListener('click', closePanel);

    function closePanel(){
      panel.classList.remove('open');
      panelCountry=null; travelExpanded=false;
      travelInfo.classList.remove('visible');
      seeMoreBtn.textContent='✈️ Travel Info';
    }

    function setText(id, val){ document.getElementById(id).textContent = val || '—'; }

    function fmtPop(n){
      if(n>=1e9)return(n/1e9).toFixed(1)+'B';
      if(n>=1e6)return(n/1e6).toFixed(1)+'M';
      if(n>=1e3)return(n/1e3).toFixed(0)+'K';
      return String(n);
    }

    function openPanel(countryName, code){
      if(panelCountry===countryName)return;
      panelCountry=countryName; travelExpanded=false;
      travelInfo.classList.remove('visible');
      seeMoreBtn.textContent='✈️ Travel Info';

      setText('panel-country-name', countryName);
      setText('panel-region','');
      setText('stat-capital','—'); setText('stat-pop','—');
      setText('stat-currency','—'); setText('stat-lang','—');

      const flagEl=document.getElementById('panel-flag');
      if(code){ flagEl.src=`https://flagcdn.com/w160/${code}.png`; flagEl.style.display='block'; }
      else flagEl.style.display='none';

      panel.classList.add('open');

      const q=encodeURIComponent(countryName);
      fetch(`https://restcountries.com/v3.1/name/${q}?fullText=true&fields=name,capital,population,currencies,languages,region,subregion`)
        .then(r=>r.json()).then(data=>{
          const c=data[0]; if(!c)return;
          setText('panel-region',[c.subregion,c.region].filter(Boolean).join(' · '));
          setText('stat-capital',(c.capital||[]).join(', ')||'—');
          setText('stat-pop',c.population?fmtPop(c.population):'—');
          const curs=Object.values(c.currencies||{});
          setText('stat-currency',curs.map(x=>`${x.symbol||''} ${x.name}`).join(', ')||'—');
          const langs=Object.values(c.languages||{});
          setText('stat-lang',langs[0]||'—');
        }).catch(()=>{});
    }

    function makeTravelRow(icon, key, val){
      const row=document.createElement('div'); row.className='info-row';
      const ic=document.createElement('div'); ic.className='info-icon'; ic.textContent=icon;
      const txt=document.createElement('div');
      const k=document.createElement('div'); k.className='info-key'; k.textContent=key;
      const v=document.createElement('div'); v.className='info-val'; v.textContent=val;
      txt.appendChild(k); txt.appendChild(v);
      row.appendChild(ic); row.appendChild(txt);
      return row;
    }

    function makeSection(title, rows){
      const sec=document.createElement('div'); sec.className='info-section';
      const t=document.createElement('div'); t.className='info-section-title'; t.textContent=title;
      sec.appendChild(t);
      rows.forEach(r=>sec.appendChild(r));
      return sec;
    }

    seeMoreBtn.addEventListener('click',()=>{
      if(travelExpanded){
        travelInfo.classList.remove('visible'); travelExpanded=false;
        seeMoreBtn.textContent='✈️ Travel Info'; return;
      }
      travelExpanded=true; seeMoreBtn.textContent='▲ Hide';
      travelInfo.innerHTML='<div id="travel-loading">Loading…</div>';
      travelInfo.classList.add('visible');

      const q=encodeURIComponent(panelCountry);
      fetch(`https://restcountries.com/v3.1/name/${q}?fullText=true&fields=name,capital,currencies,languages,timezones,car,idd,population,area`)
        .then(r=>r.json()).then(data=>{
          const c=data[0];
          if(!c){ travelInfo.innerHTML='<div id="travel-loading">No data found.</div>'; return; }

          travelInfo.innerHTML='';

          const langs=Object.values(c.languages||{});
          const curs=Object.values(c.currencies||{});
          const tz=(c.timezones||[]).filter(t=>!t.includes('-')).slice(0,2).join(', ')||(c.timezones||[])[0]||'—';
          const side=c.car?.side==='left'?'Left-hand traffic':'Right-hand traffic';
          const dial=c.idd?.root?(c.idd.root+(c.idd.suffixes?.[0]||'')):'—';
          const area=c.area?c.area.toLocaleString()+' km²':'—';
          const pop=c.population?c.population.toLocaleString():'—';
          const cap=(c.capital||[]).join(', ')||'—';

          travelInfo.appendChild(makeSection('Language & Money',[
            makeTravelRow('🗣️','Official Language(s)', langs.join(', ')||'—'),
            makeTravelRow('💰','Currency', curs.map(x=>`${x.name} (${x.symbol||''})`).join(', ')||'—'),
          ]));

          travelInfo.appendChild(makeSection('Getting There & Around',[
            makeTravelRow('🕐','Time Zone(s)', tz),
            makeTravelRow('📞','Calling Code', dial),
            makeTravelRow('🚗','Driving Side', side),
          ]));

          travelInfo.appendChild(makeSection('Quick Facts',[
            makeTravelRow('🏙️','Capital', cap),
            makeTravelRow('👥','Population', pop),
            makeTravelRow('📏','Total Area', area),
          ]));

          travelInfo.appendChild(makeSection('Travel Tips',[
            makeTravelRow('💡','Local Language', `Learning a few words in ${langs[0]||'the local language'} goes a long way — locals love it.`),
            makeTravelRow('🔌','Power Adapter', 'Check plug type before you pack — it varies by region.'),
            makeTravelRow('🛂','Entry Requirements', 'Verify visa requirements for your nationality well before booking.'),
            makeTravelRow('🏥','Health & Safety', 'Check travel advisories and recommended vaccinations for this region.'),
          ]));
        })
        .catch(()=>{ travelInfo.innerHTML='<div id="travel-loading">Could not load travel info.</div>'; });
    });

    // ── Data stores ────────────────────────────────────────
    const countryData=[], stateData=[];
    const label=document.getElementById('country-label');
    let currentLabel=null;
    let hoveredPin=null;   // {country, code} of pin currently under cursor
    const countryCodeMap={};

    const GEO_COUNTRIES='https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';
    const GEO_US_STATES='https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json';

    Promise.all([
      fetch(GEO_COUNTRIES).then(r=>r.json()),
      fetch(GEO_US_STATES).then(r=>r.json()),
      fetch('capitals.json').then(r=>r.json()),
    ]).then(([countries,usStates,capitals])=>{
      capitals.forEach(({country,code})=>{ countryCodeMap[country]=code; });

      scene.add(new THREE.LineSegments(buildBorderLines(countries,1.002),
        new THREE.LineBasicMaterial({color:0xffffff,opacity:0.25,transparent:true})));
      scene.add(new THREE.LineSegments(buildBorderLines(usStates,1.0025),
        new THREE.LineBasicMaterial({color:0xffffff,opacity:0.45,transparent:true})));

      countries.features.forEach(f=>{
        if(!f.geometry)return;
        const name=f.properties.ADMIN||f.properties.name||'Unknown';
        const g=f.geometry, polygons=g.type==='Polygon'?[g.coordinates]:g.coordinates;
        countryData.push({name,polygons});
      });
      usStates.features.forEach(f=>{
        if(!f.geometry)return;
        const name=f.properties.name||'Unknown State';
        const g=f.geometry, polygons=g.type==='Polygon'?[g.coordinates]:g.coordinates;
        stateData.push({name,polygons});
      });

      buildPins(capitals);
    });

    // ── Click / tap → open panel ───────────────────────────
    let mouseDownPos={x:0,y:0};
    renderer.domElement.addEventListener('mousedown',e=>{mouseDownPos={x:e.clientX,y:e.clientY};});
    renderer.domElement.addEventListener('click',e=>{
      if(Math.abs(e.clientX-mouseDownPos.x)>5||Math.abs(e.clientY-mouseDownPos.y)>5)return;
      if(hoveredPin){ openPanel(hoveredPin.country, hoveredPin.code); return; }
      if(!currentLabel)return;
      const isState=stateData.some(s=>s.name===currentLabel);
      openPanel(isState?'United States':currentLabel, isState?'us':(countryCodeMap[currentLabel]||null));
    });

    // Touch tap: record start, detect country on touchstart, open panel on touchend if no drag
    let touchStart={x:0,y:0};
    renderer.domElement.addEventListener('touchstart',e=>{
      const t=e.touches[0];
      touchStart={x:t.clientX,y:t.clientY};
    },{passive:true});
    renderer.domElement.addEventListener('touchend',e=>{
      const t=e.changedTouches[0];
      const dx=Math.abs(t.clientX-touchStart.x), dy=Math.abs(t.clientY-touchStart.y);
      if(dx>10||dy>10)return; // was a drag, not a tap
      if(hoveredPin){ openPanel(hoveredPin.country, hoveredPin.code); return; }
      if(!currentLabel)return;
      const isState=stateData.some(s=>s.name===currentLabel);
      openPanel(isState?'United States':currentLabel, isState?'us':(countryCodeMap[currentLabel]||null));
    },{passive:true});

    // ── Hover / touch detection ────────────────────────────
    const raycaster=new THREE.Raycaster();
    const mouse=new THREE.Vector2();

    function detectCountry(clientX,clientY){
      mouse.x=(clientX/innerWidth)*2-1;
      mouse.y=-(clientY/innerHeight)*2+1;
      raycaster.setFromCamera(mouse,camera);

      if(pinSprites.length){
        const sprites=pinSprites.map(p=>p.sprite);
        const pinHits=raycaster.intersectObjects(sprites);
        if(pinHits.length){
          const hit=pinSprites.find(p=>p.sprite===pinHits[0].object);
          if(hit){
            const lbl=`${hit.capital} · ${hit.country}`;
            hoveredPin={country:hit.country, code:hit.code};
            if(lbl!==currentLabel){
              currentLabel=lbl; label.textContent=lbl; label.classList.add('visible');
              paintCountry(null);
              pinSprites.forEach(p=>p.sprite.material.color.set(0xffffff));
              hit.sprite.material.color.set(0xffdd00);
            }
            return;
          }
        }
      }
      hoveredPin=null;
      pinSprites.forEach(p=>p.sprite.material.color.set(0xffffff));

      const hits=raycaster.intersectObject(earth);
      if(!hits.length){ currentLabel=null; label.classList.remove('visible'); paintCountry(null); return; }

      const[lat,lng]=xyz2ll(hits[0].point);
      const pt=[lng,lat];

      const state=stateData.find(({polygons})=>polygons.some(r=>pointInPolygon(pt,r)));
      if(state){
        if(state.name===currentLabel)return;
        currentLabel=state.name; label.textContent=state.name; label.classList.add('visible');
        paintCountry(state.polygons); return;
      }

      const country=countryData.find(({polygons})=>polygons.some(r=>pointInPolygon(pt,r)));
      if(!country){ currentLabel=null; label.classList.remove('visible'); paintCountry(null); return; }
      if(country.name===currentLabel)return;
      currentLabel=country.name; label.textContent=country.name; label.classList.add('visible');
      paintCountry(country.polygons);
    }

    window.addEventListener('mousemove',e=>detectCountry(e.clientX,e.clientY));
    // Touch move = drag to rotate (handled by OrbitControls), also update hover
    renderer.domElement.addEventListener('touchmove',e=>{
      const t=e.touches[0]; detectCountry(t.clientX,t.clientY);
    },{passive:true});
    // Detect country on initial touch so label shows before lifting finger
    renderer.domElement.addEventListener('touchstart',e=>{
      const t=e.touches[0]; detectCountry(t.clientX,t.clientY);
    },{passive:true});

    // ── Render loop ────────────────────────────────────────
    const BASE_SCALE=0.022, BASE_DIST=INITIAL_DIST;

    function animate(){
      requestAnimationFrame(animate);
      controls.autoRotate=camera.position.length()>=INITIAL_DIST-0.05;
      controls.update();
      const dist=camera.position.length();
      const scale=BASE_SCALE*(dist/BASE_DIST);
      pinSprites.forEach(p=>{
        if(p.sprite.material.color.getHex()!==0xffdd00)
          p.sprite.scale.set(scale,scale*0.727,1);
      });
      renderer.render(scene,camera);
    }
    animate();
  </script>
</body>
</html>
